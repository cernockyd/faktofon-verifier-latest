version: "3.8"

services:
  editor:
    build: ./client
    container_name: editor
    ports:
      - "3000:3000"
    depends_on:
      - agent
    env_file:
      - ./client/.env
    environment:
      - AGENT_URL=${EDITOR_AGENT_URL}

  agent:
    build: ./agent
    container_name: agent
    ports:
      - "8000:8000"
    environment:
      - ALLOW_ORIGINS=${AGENT_ALLOW_ORIGINS}
      #  - REDIS_URL=redis://redis:6379
      - MLFLRUN pnpm fetch
    env_file:
      - .env
    depends_on:
      #  - redis
      - mlflow
    volumes:
      - ./agent/src:/app/src
      - ./agent/pyproject.toml:/app/pyproject.toml
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - faktofon-network
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # redis:
  #   image: redis:7-alpine
  #   container_name: faktofon-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   command: redis-server --appendonly yes
  #   restart: unless-stopped
  #   networks:
  #     - faktofon-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.9.0
    container_name: faktofon-mlflow
    ports:
      - "5002:5002"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
      - mlflow-backend:/mlflow/backend
    environment:
      - MLFLOW_SERVER_ALLOWED_HOSTS=*
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/backend/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0
      --port 5002
    restart: unless-stopped
    networks:
      - faktofon-network

volumes:
  mlflow-artifacts:
  mlflow-backend:
  # redis-data:

networks:
  faktofon-network:
    driver: bridge
